<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen | MIJNsimplyhenna</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f7f1eb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:400px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

h1{
    color:#5c3a21;
    margin-bottom:10px;
}

p{
    color:#777;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#5c3a21;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#5c3a21;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="card">

<h1>🤎 Welkom terug!</h1>

<p>Log in op MIJNsimplyhenna.</p>

<input type="email" placeholder="E-mailadres">

<input type="password" placeholder="Wachtwoord">

<button>Inloggen</button>

<a href="register.html">Nog geen account? Maak er één.</a>

</div>

</body>
</html>
