<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Profiel | Simply Henna</title>

    <link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="container">

    <a href="../dashboard.html" class="backButton">
        ← Terug naar dashboard
    </a>

    <h1>👤 Mijn profiel</h1>

    <div id="successMessage" class="success">
        ✅ Je profiel is succesvol opgeslagen.
    </div>

    <form id="profileForm">

        <label for="voornaam">Voornaam</label>
        <input type="text" id="voornaam">

        <label for="achternaam">Achternaam</label>
        <input type="text" id="achternaam">

        <label for="email">E-mailadres</label>
        <input type="email" id="email" disabled>

        <label for="telefoon">Telefoonnummer</label>
        <input type="tel" id="telefoon">

        <label for="geboortedatum">Geboortedatum</label>
        <input type="date" id="geboortedatum">

        <label for="geslacht">Geslacht</label>
        <select id="geslacht">
            <option>Man</option>
            <option>Vrouw</option>
            <option>Anders</option>
            <option>Zeg ik liever niet</option>
        </select>

        <div class="checkbox">
            <input type="checkbox" id="nieuwsbrief">
            <label for="nieuwsbrief">Ik wil de nieuwsbrief ontvangen</label>
        </div>

        <button type="submit">
            💾 Wijzigingen opslaan
        </button>

    </form>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
