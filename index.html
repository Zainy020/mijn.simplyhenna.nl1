<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIJNsimplyhenna</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f7f1eb;
      color:#4e342e;
    }

    nav{
      background:#5c3a21;
      color:white;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav h1{
      font-size:28px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      font-weight:bold;
    }

    .hero{
      min-height:80vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:30px;
    }

    .hero h2{
      font-size:55px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      max-width:700px;
      margin-bottom:40px;
    }

    .buttons{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      padding:16px 35px;
      border-radius:14px;
      text-decoration:none;
      font-size:18px;
      transition:.2s;
    }

    .primary{
      background:#5c3a21;
      color:white;
    }

    .secondary{
      border:2px solid #5c3a21;
      color:#5c3a21;
    }

    .btn:hover{
      transform:translateY(-3px);
    }

    footer{
      text-align:center;
      padding:30px;
      color:#777;
    }
  </style>
</head>

<nav>
  <h1>🤎 MIJNsimplyhenna</h1>

  <div>
    <a href="login.html">Inloggen</a>
    <a href="register.html">Account maken</a>
  </div>
</nav>

<section class="hero">

<h2>Welkom bij MIJNsimplyhenna</h2>

<p>
Bekijk je Henna Points, spaar voor beloningen,
bekijk je afspraken en beheer je account op één plek.
</p>

<div class="buttons">

<a class="btn primary" href="register.html">
Account maken
</a>

<a class="btn secondary" href="login.html">
Inloggen
</a>

</div>

</section>

<footer>

© 2026 Simply Henna

</footer>

</body>
</html>
